name: CI — Quantum Maestro v2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ast-gate:
    name: AST Gate (hard block)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: AST parse (never push broken code)
        run: python3 -c "import ast; ast.parse(open('app.py').read()); print('✅ app.py parses')"

  lint:
    name: Lint (ruff)
    needs: ast-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff
      - run: ruff check app.py ml_signals.py --select E,F,W --ignore E501,E402,E701,E722,F401,F841,W605

  unit-tests:
    name: Unit Tests (IWT + math)
    needs: ast-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install dependencies
        run: |
          pip install pytest pandas numpy scipy scikit-learn pytz
          pip install -r requirements.txt
      - name: Run IWT + smoke tests
        run: pytest tests/ -v --tb=short -x
